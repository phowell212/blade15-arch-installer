name: Build Arch ISO

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Free runner disk space
        run: |
          sudo rm -rf -- /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Run unit and static checks
        run: sudo docker run --rm -v "$GITHUB_WORKSPACE:/workspace" -w /workspace archlinux:base-devel ./scripts/ci-static.sh

      - name: Build and verify ISO
        run: sudo docker run --privileged --rm -v /dev:/dev -v "$GITHUB_WORKSPACE:/workspace" -w /workspace archlinux:base-devel ./scripts/ci-build.sh

      - name: Upload verified ISO
        if: ${{ always() && hashFiles('dist/.verified') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: blade15-arch-gnome-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.iso
            dist/*.sha256
            dist/*manifest*
